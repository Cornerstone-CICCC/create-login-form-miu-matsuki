<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <title>Document</title>
  </head>
  <body>
    <main>
      <div class="left">
        <header>
          <img src="images/logo.svg" alt="camp-in-logo" />
        </header>
        <div class="login-container">
          <form action="" method="post">
            <div class="login-header">
              <div class="title">
                <img src="images/log-in.svg" alt="" />
                <h1>Login</h1>
              </div>
              <p>Insert your information below.</p>
            </div>

            <!-- have to add icon -->
            <div class="form-group">
              <label for="email">E-mail</label>
              <div class="input-wrapper">
                <img src="images/mail.svg" alt="" />
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="Type your email"
                />
              </div>
            </div>
            <!-- have to add icon -->
            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <img src="images/lock.svg" alt="" />
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="Type your password"
                  minlength="8"
                  required
                />
                <button type="button" id="togglePassword">
                  <img src="images/eye.svg" alt="" />
                </button>
              </div>
            </div>

            <div class="form-option">
              <div class="remember-me">
                <input type="checkbox" name="remindMe" id="remindMe" />
                <label for="remindMe">Remind me</label>
              </div>
              <a href="#">Forgot my password</a>
            </div>

            <button class="login-button" type="submit">LOG IN</button>

            <div class="signup-link">
              <span>Don't have an account? </span><a href="#">Sign up!</a>
            </div>
          </form>
        </div>
      </div>
      <div class="image-container right">
        <img src="images/side-image-2x.jpg" alt="camp-image" />
      </div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
